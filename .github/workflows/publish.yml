name: Publish to PyPI

# This workflow triggers automatically when you push a new tag starting with 'v' (e.g., v0.1.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    environment: pypi  # Must match the environment name we set up in Step 2
    
    # These permissions are REQUIRED for Trusted Publishing (OIDC) to work
    permissions:
      id-token: write  
      contents: read   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Build the package
        run: uv build

      - name: Publish to PyPI
        # uv natively understands how to use the GitHub OIDC token!
        run: uv publish